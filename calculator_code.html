<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Calculator</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
      font-family: sans-serif;
    }

    :root {
      --accent: #f90;
      --border: #444;
      --text-secondary: #aaa;
    }

    #calc-modal {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .calc-box {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .calc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .calc-head button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
    }

    .calc-display {
      background: #111;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
    }

    #calc-expr {
      font-size: 12px;
      color: #888;
      min-height: 16px;
      word-break: break-all;
    }

    #calc-display {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      word-break: break-all;
    }

    #calc-history {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      max-height: 70px;
      overflow-y: auto;
    }

    #calc-history div {
      border-bottom: 1px solid var(--border);
      padding: 2px 0;
    }

    .calc-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .cbtn {
      padding: 16px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #2e2e2e;
      color: #fff;
    }

    .cbtn:active { opacity: 0.7; }

    .cbtn-fn {
      background: #3a3a3a;
      color: #fff;
    }

    .cbtn-op {
      background: var(--accent);
      color: #fff;
    }

    .cbtn-eq {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>

<div id="calc-modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="calc-box">
    <div class="calc-head">
      <span>🧮 Advanced Calculator</span>
      <button onclick="document.getElementById('calc-modal').style.display='none'">✕</button>
    </div>
    <div class="calc-display">
      <div id="calc-expr"></div>
      <div id="calc-display">0</div>
    </div>
    <div id="calc-history"></div>
    <div class="calc-tabs">
      <button onclick="calcSetMode('basic')" id="tab-basic" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--accent);background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;">Basic</button>
      <button onclick="calcSetMode('sci')" id="tab-sci" style="flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;">Scientific</button>
    </div>
    <div id="calc-basic" class="calc-grid">
      <button class="cbtn cbtn-fn" onclick="calcFunc('AC')">AC</button>
      <button class="cbtn cbtn-fn" onclick="calcFunc('+/-')">+/-</button>
      <button class="cbtn cbtn-fn" onclick="calcFunc('%')">%</button>
      <button class="cbtn cbtn-op" onclick="calcInput('/')">÷</button>
      <button class="cbtn" onclick="calcInput('7')">7</button>
      <button class="cbtn" onclick="calcInput('8')">8</button>
      <button class="cbtn" onclick="calcInput('9')">9</button>
      <button class="cbtn cbtn-op" onclick="calcInput('*')">×</button>
      <button class="cbtn" onclick="calcInput('4')">4</button>
      <button class="cbtn" onclick="calcInput('5')">5</button>
      <button class="cbtn" onclick="calcInput('6')">6</button>
      <button class="cbtn cbtn-op" onclick="calcInput('-')">−</button>
      <button class="cbtn" onclick="calcInput('1')">1</button>
      <button class="cbtn" onclick="calcInput('2')">2</button>
      <button class="cbtn" onclick="calcInput('3')">3</button>
      <button class="cbtn cbtn-op" onclick="calcInput('+')">+</button>
      <button class="cbtn" onclick="calcInput('(')">(</button>
      <button class="cbtn" onclick="calcInput('0')">0</button>
      <button class="cbtn" onclick="calcInput('.')">.</button>
      <button class="cbtn cbtn-eq" onclick="calcEquals()">=</button>
    </div>
    <div id="calc-sci" style="display:none" class="calc-grid">
      <button class="cbtn cbtn-fn" onclick="calcSci('sin')">sin</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('cos')">cos</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('tan')">tan</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('log')">log</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('sqrt')">√</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('pow2')">x²</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('inv')">1/x</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('pi')">π</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('e')">e</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('ln')">ln</button>
      <button class="cbtn cbtn-fn" onclick="calcSci('abs')">|x|</button>
      <button class="cbtn cbtn-fn" onclick="calcFunc('AC')">AC</button>
      <button class="cbtn" onclick="calcInput('7')">7</button>
      <button class="cbtn" onclick="calcInput('8')">8</button>
      <button class="cbtn" onclick="calcInput('9')">9</button>
      <button class="cbtn cbtn-op" onclick="calcInput('/')">÷</button>
      <button class="cbtn" onclick="calcInput('4')">4</button>
      <button class="cbtn" onclick="calcInput('5')">5</button>
      <button class="cbtn" onclick="calcInput('6')">6</button>
      <button class="cbtn cbtn-op" onclick="calcInput('*')">×</button>
      <button class="cbtn" onclick="calcInput('1')">1</button>
      <button class="cbtn" onclick="calcInput('2')">2</button>
      <button class="cbtn" onclick="calcInput('3')">3</button>
      <button class="cbtn cbtn-op" onclick="calcInput('-')">−</button>
      <button class="cbtn" onclick="calcInput('0')">0</button>
      <button class="cbtn" onclick="calcInput('.')">.</button>
      <button class="cbtn cbtn-op" onclick="calcInput('+')">+</button>
      <button class="cbtn cbtn-eq" onclick="calcEquals()">=</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("keydown", function (e) {
  const modal = document.getElementById("calc-modal");
  if (!modal || modal.style.display === "none") return;
  const key = e.key;
  if (/^[0-9]$/.test(key)) { calcInput(key); }
  else if (["+", "-", "*", "/", ".", "(", ")"].includes(key)) { calcInput(key); }
  else if (key === "Enter" || key === "=") { e.preventDefault(); calcEquals(); }
  else if (key === "Backspace") {
    if (typeof calcExpr !== "undefined") { calcExpr = calcExpr.slice(0, -1); calcUpdate(); }
  }
  else if (key === "Delete") { calcFunc("AC"); }
  else if (key === "Escape") { modal.style.display = "none"; }
  else if (key === "%") { calcFunc("%"); }
});

var calcVal="0",calcExpr="",calcNewNum=true;

function calcUpdate(){
  document.getElementById("calc-display").textContent=calcVal;
  document.getElementById("calc-expr").textContent=calcExpr;
}

function calcInput(v){
  var ops=["+","-","*","/"];
  if(ops.includes(v)){calcExpr+=v;calcNewNum=true;calcVal=v;calcUpdate();return;}
  if(v==="("){calcExpr+="(";calcNewNum=false;calcVal="(";calcUpdate();return;}
  if(calcNewNum){calcVal=v;calcNewNum=false;}else{if(v==="."&&calcVal.includes("."))return;calcVal+=v;}
  calcExpr+=v;calcUpdate();
}

function calcFunc(f){
  if(f==="AC"){calcVal="0";calcExpr="";calcNewNum=true;calcUpdate();}
  else if(f==="+/-"){calcVal=String(-parseFloat(calcVal)||0);calcUpdate();}
  else if(f==="%"){calcVal=String(parseFloat(calcVal)/100);calcUpdate();}
}

function calcSci(f){
  var n=parseFloat(calcVal)||0,r;
  var map={sin:Math.sin(n*Math.PI/180),cos:Math.cos(n*Math.PI/180),tan:Math.tan(n*Math.PI/180),log:Math.log10(n),ln:Math.log(n),sqrt:Math.sqrt(n),pow2:n*n,inv:1/n,abs:Math.abs(n),pi:Math.PI,e:Math.E};
  r=map[f];
  if(r===undefined)return;
  calcExpr=f+"("+calcVal+") = "+r;
  calcVal=String(parseFloat(r.toFixed(10)));
  calcNewNum=true;calcUpdate();
}

function calcEquals(){
  try{
    var expr=calcExpr.replace(/×/g,"*").replace(/÷/g,"/");
    var result=Function('"use strict";return ('+expr+')')();
    result=parseFloat(result.toFixed(10));
    addHistory(calcExpr+" = "+result);
    calcExpr="";calcVal=String(result);calcNewNum=true;calcUpdate();
  }catch(e){calcVal="Error";calcExpr="";calcNewNum=true;calcUpdate();}
}

function addHistory(entry){
  var h=document.getElementById("calc-history");
  var d=document.createElement("div");d.textContent=entry;
  h.insertBefore(d,h.firstChild);
  if(h.children.length>5)h.removeChild(h.lastChild);
}

function calcSetMode(m){
  document.getElementById("calc-basic").style.display=m==="basic"?"grid":"none";
  document.getElementById("calc-sci").style.display=m==="sci"?"grid":"none";
  document.getElementById("tab-basic").style.background=m==="basic"?"var(--accent)":"transparent";
  document.getElementById("tab-basic").style.color=m==="basic"?"#fff":"var(--text-secondary)";
  document.getElementById("tab-sci").style.background=m==="sci"?"var(--accent)":"transparent";
  document.getElementById("tab-sci").style.color=m==="sci"?"#fff":"var(--text-secondary)";
}
</script>

</body>
</html>
